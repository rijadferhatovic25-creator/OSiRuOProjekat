# =============================================================
# docker-compose.yml — Filmoteka
#
# Orkestira 3 servisa kao jedan sistem:
#   1. mysql    — MariaDB/MySQL baza podataka
#   2. backend  — PHP-FPM (izvršava PHP kod)
#   3. frontend — Nginx (servira HTML/CSS/JS, proxira PHP)
#
# Tok HTTP requesta:
#   Browser → Nginx:80 → PHP-FPM:9000 → MySQL:3306
#
# Pokretanje: docker compose up --build
# Zaustavljanje: docker compose down
# =============================================================

# =============================================================
# SERVICES
# =============================================================
services:

  # ============================================================
  # SERVIS 1: MySQL Baza Podataka
  # ============================================================
  mysql:
    # Koristimo MariaDB 10.11 LTS — 100% kompatibilan sa MySQL 8.0
    # i identičan tvojoj XAMPP konfiguraciji (MariaDB 10.4.32)
    # mysql:8.0 bi također radio, ali MariaDB je lakši image
    image: mariadb:10.11

    # Eksplicitno ime kontejnera (lakše za debugging)
    container_name: filmoteka_mysql

    # Automatski restart ako kontejner crashuje
    # "unless-stopped": restartuje osim ako si ga ručno zaustavio
    restart: unless-stopped

    # Environment varijable koje MariaDB čita pri inicijalizaciji
    # Docker Compose čita ${VARIJABLA} iz .env fajla automatski
    environment:
      # Root lozinka za MySQL (samo za inicijalizaciju i admin pristup)
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Ime baze koja će biti kreirana automatski pri startu
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      # Korisnik kojeg PHP koristi (ima pristup samo filmoteka_db)
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
      # Charset — kritično za BHS karaktere
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATION_SERVER: utf8mb4_general_ci

    volumes:
      # ⭐ NAMED VOLUME — Perzistentni storage za MySQL podatke
      # Bez ovog volumea, SVI PODACI se brišu kada kontejner stane!
      # mysql_data je definisan u volumes: sekciji na dnu fajla.
      # Docker ga kreira na host sistemu i maže između restartova.
      - mysql_data:/var/lib/mysql

      # BIND MOUNT — SQL fajl za inicijalizaciju baze
      # MariaDB/MySQL automatski izvršava sve .sql i .sh fajlove
      # iz /docker-entrypoint-initdb.d/ SAMO ako je baza prazna.
      # :ro = read-only (kontejner ne može mijenjati fajl)
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

    # Zdravstvena provjera baze — backend čeka na ovu provjeru
    # prije nego se konektuje (vidi depends_on u backend servisu)
    healthcheck:
      # mysqladmin ping: šalje ping MySQL serveru i provjeri odgovor
      # Ovo potvrđuje da MySQL PRIHVATA KONEKCIJE, ne samo da je proces aktivan
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}"
        ]
      # Pokušaj svakih 20 sekundi
      interval: 20s
      # Proglasi neuspješnim ako nema odgovora za 10s
      timeout: 10s
      # Broj pokušaja prije nego proglasi kontejner "unhealthy"
      retries: 5
      # Čekaj 40s na početku — MySQL treba vremena za inicijalizaciju
      # (posebno prvi put kada izvršava init.sql)
      start_period: 40s

    # Priključi na internu Docker mrežu
    networks:
      - filmoteka_net

    # Portovi — OPCIONALNO za lokalni razvoj
    # Dozvoljava direktan pristup MySQL-u sa host mašine
    # (npr. iz DBeaver-a ili MySQL Workbench-a)
    # U produkciji (GCP) ovo UKLONI — MySQL ne smije biti izložen internetu!
    ports:
      - "3307:3306"
    # Koristimo 3307 umjesto 3306 da izbjegnemo konflikt
    # sa lokalnim XAMPP MySQL-om koji već koristi 3306

  # ============================================================
  # SERVIS 2: PHP Backend (PHP-FPM)
  # ============================================================
  backend:
    # Buildujemo image iz ./backend/Dockerfile
    build:
      # context: folder koji Docker šalje build engineu
      # Svi COPY naredbe u Dockerfile-u su relativni na ovaj folder
      context: ./backend
      dockerfile: Dockerfile
      # Disable BuildKit za izbegavanje problama sa file requests
      args:
        BUILDKIT_INLINE_CACHE: 0

    container_name: filmoteka_backend
    restart: unless-stopped

    # Environment varijable za PHP aplikaciju
    # db.php čita ove varijable putem getenv()
    environment:
      # DB_HOST = "mysql" — ime MySQL servisa = Docker DNS hostname
      # Docker automatski razrješava "mysql" u IP adresu MySQL kontejnera
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      APP_ENV: production

    volumes:
      # BIND MOUNT za uploads folder
      # Profilne slike koje korisnici uploaduju (edit_profil.php)
      # moraju biti persistent — ne smiju se brisati pri restartu!
      # host_path:container_path
      - ./uploads:/var/www/filmoteka/uploads

    # depends_on: Kontroliše redosljed startanja servisa
    # KLJUČNA RAZLIKA:
    # - depends_on bez condition: čeka samo da kontejner STARTA
    # - depends_on sa condition: čeka da kontejner bude ZDRAV (healthcheck prođe)
    # Koristimo service_healthy jer MySQL treba 30-60s za inicijalizaciju!
    # Bez ovoga PHP bi pokušao konekciju dok MySQL još nije spreman.
    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - filmoteka_net

  # ============================================================
  # SERVIS 3: Nginx Frontend
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: filmoteka_nginx
    restart: unless-stopped

    # ports: Mapiranje host_port:container_port
    # "8080:80" = na host mašini otvori port 8080,
    #             preusmjeri na kontejner port 80 (Nginx)
    # Aplikacija dostupna na: http://localhost:8080
    ports:
      - "8080:80"

    # Volumes za uploads — frontend MORA imati isti uploads folder
    # kao backend, da može servirati profilne slike korisnicima!
    # (CSS u img src='/uploads/user_6_xxx.png' mora biti dostupan)
    volumes:
      - ./uploads:/var/www/filmoteka/uploads

    # Frontend čeka da backend bude spreman
    # (Nginx mora znati da je PHP-FPM aktivan)
    depends_on:
      - backend

    networks:
      - filmoteka_net

# =============================================================
# VOLUMES — Named Volumes (Docker ih maintainuje)
# =============================================================
volumes:
  # mysql_data: čuva sve MySQL podatke na host disku
  # Lokacija na host mašini (Linux): /var/lib/docker/volumes/filmoteka_mysql_data/_data
  # Lokacija na host mašini (Windows): \\wsl$\docker-desktop-data\...
  #
  # BITAN PRINCIP: Named volume preživljava:
  # - docker compose down (podaci ostaju)
  # - Restart kontejnera
  # - Rebuild image-a
  #
  # Podaci se BRIŠU SAMO sa: docker compose down -v
  mysql_data:
    driver: local

# =============================================================
# NETWORKS — Interna Docker mreža
# =============================================================
networks:
  # filmoteka_net: Izolirana bridge mreža
  # Svi servisi unutar ove mreže mogu komunicirati po imenu:
  # - backend može pristupiti mysql-u na: mysql:3306
  # - frontend može pristupiti backend-u na: backend:9000
  # - Nijedan od ovih portova nije dostupan sa interneta!
  filmoteka_net:
    driver: bridge
