; =============================================================
; backend/php-fpm.conf — PHP-FPM Pool Konfiguracija
;
; PHP-FPM "pool" je grupa PHP worker procesa koji obrađuju
; HTTP requestove. Svaki request dobija jedan worker proces.
; =============================================================

[www]
; Korisnik i grupa pod kojim PHP-FPM procesi rade
; Mora biti konzistentno sa Nginx-om (www-data)
user = www-data
group = www-data

; Adresa na kojoj PHP-FPM sluša za FastCGI konekcije
; Nginx se konektuje na ovu adresu (backend:9000)
; 0.0.0.0 znači sluša na svim mrežnim interfejsima
listen = 0.0.0.0:9000

; ---- Process Manager Postavke ----
; pm = dynamic: Broj procesa se dinamički prilagođava opterećenju
; Alternativa: static (uvijek isti broj) ili ondemand (samo kad treba)
pm = dynamic

; Maksimalni broj worker procesa koji mogu raditi paralelno
; Za Cloud Run s 1 CPU i 512MB RAM, 10 je dobra vrijednost
pm.max_children = 10

; Broj procesa koji se startaju pri pokretanju PHP-FPM-a
pm.start_servers = 2

; Minimalni broj procesa koji miruju (čekaju novi request)
pm.min_spare_servers = 1

; Maksimalni broj procesa koji miruju
pm.max_spare_servers = 3

; ---- Logging ----
; Logiraj spore PHP requestove (duže od 10 sekundi)
;slowlog = /var/log/php/slow.log
;request_slowlog_timeout = 10s

; ---- Environment varijable ----
; Prosljeđuje sve environment varijable iz Docker-a PHP skriptama
; Ovo je KLJUČNO — bez ovoga getenv() ne bi radio!
clear_env = no

; ---- Status endpoint ----
; Korisno za monitoring i healthcheck
pm.status_path = /status
ping.path = /ping
ping.response = pong
