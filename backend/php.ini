; =============================================================
; backend/php.ini — Filmoteka PHP Konfiguracija
; Produkcijske postavke optimizovane za tvoju aplikaciju
; =============================================================

[PHP]
; ---- Greške ----
; U produkciji NIKAD ne prikazuj greške korisniku!
; Greške se loguju u fajl, ne prikazuju na ekranu.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ---- Upload fajlova ----
; edit_profil.php: korisnici uploaduju profilne slike
; Maksimalna veličina upload-a (mora biti konzistentna sa nginx client_max_body_size)
file_uploads = On
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 5

; ---- Sessioni ----
; session_start() koriste sve tvoje stranice
; Sačuvaj sessione na disku
session.save_path = /tmp/php_sessions
session.gc_maxlifetime = 3600
; Sigurnosne postavke za sessione
session.cookie_httponly = 1
session.use_strict_mode = 1

; ---- Performanse ----
; Maksimalno memorije za jedan PHP request
memory_limit = 256M
; Maksimalno vrijeme izvršavanja PHP skripte (sekunde)
max_execution_time = 60
; Maksimalno vrijeme čekanja na input podatke
max_input_time = 60

; ---- Charset ----
; UTF-8 za ispravno prikazivanje BHS karaktera
default_charset = "UTF-8"
mbstring.internal_encoding = UTF-8
mbstring.encoding_translation = Off

; ---- Timezone ----
date.timezone = "Europe/Sarajevo"

; ---- Sigurnost ----
; Ne prikazuj PHP verziju u HTTP headerima
expose_php = Off
; Dozvoli URL wrappers za file_get_contents itd.
allow_url_fopen = On
allow_url_include = Off
