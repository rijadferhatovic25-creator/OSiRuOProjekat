; =============================================================
; backend/opcache.ini — OPcache Konfiguracija
;
; OPcache kompajlira PHP kod u bytecode i kešira ga u memoriji.
; Bez OPcache-a: svaki request čita, parsira i kompajlira PHP fajl.
; Sa OPcache-om: kompajlirani bytecode je u memoriji — ~3x brže.
; =============================================================

[opcache]
; Uključi OPcache
opcache.enable=1

; Uključi OPcache i za CLI (php komande u terminalu)
opcache.enable_cli=0

; Memorija za keš (MB)
opcache.memory_consumption=128

; Memorija za interned stringove (konstantni stringovi u PHP kodu)
opcache.interned_strings_buffer=16

; Maksimalni broj fajlova u kešu
; Filmoteka ima ~20 PHP fajlova — 2000 je više nego dovoljno
opcache.max_accelerated_files=2000

; Revalidacija: koliko sekundi između provjere da li se fajl promijenio
; 0 = nikad ne provjerava (idealno za produkciju — fajlovi se ne mijenjaju)
; Za development postavi na 1 da vidiš promjene odmah
opcache.revalidate_freq=60

; Ne provjeravaj timestamps u produkciji (brže)
; PAŽNJA: postavi na 0 za development!
opcache.validate_timestamps=1

; Spremi kompajlirani kod na disk (brži restart PHP-FPM-a)
opcache.file_cache=/tmp/opcache_cache

; Agresivna optimizacija bytecode-a
opcache.optimization_level=0x7FFEBFFF
