# =============================================================
# frontend/nginx.conf — Filmoteka
#
# Nginx radi kao "reverse proxy" između browsera i PHP-FPM-a.
# Tok requesta:
#   Browser → Nginx (port 80) → PHP-FPM (port 9000) → MySQL
#
# Nginx direktno servira: CSS, JS, slike (statički fajlovi)
# Nginx proksira PHP-FPM-u: sve .php datoteke
# =============================================================

server {
    # Nginx sluša na portu 80 unutar Docker mreže
    listen 80;

    # Server name (za Cloud Run može biti _ ili konkretan domain)
    server_name _;

    # Korijen gdje se nalaze PHP fajlovi aplikacije
    # Ovo MORA biti isti put koji je definisan u PHP-FPM kontejneru
    root /var/www/filmoteka;

    # Defaultni fajl koji se servira kada se pristupi root URL-u
    # landing.php je tvoja početna stranica za nelogovane korisnike
    index landing.php index.php index.html;

    # Charset za ispravno prikazivanje BHS karaktera (č, š, ž, ć, đ)
    charset utf-8;

    # Maksimalna veličina upload-a (profilne slike)
    # Mora biti konzistentna sa PHP upload_max_filesize
    client_max_body_size 10M;

    # --------------------------------------------------------
    # Gzip kompresija — smanjuje veličinu fajlova pri transferu
    # --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        text/html;

    # --------------------------------------------------------
    # STATIČKI FAJLOVI — Nginx ih direktno servira (bez PHP)
    # CSS, JS, slike, fontovi — ne trebaju PHP obradu
    # --------------------------------------------------------
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        # Pokušaj naći fajl, ako ne postoji vrati 404
        try_files $uri =404;

        # Browser kešira statičke fajlove 1 godinu
        # "immutable" govori browseru da fajl neće se mijenjati
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Dozvoli cross-origin pristup fontovima
        add_header Access-Control-Allow-Origin *;
    }

    # --------------------------------------------------------
    # UPLOADS — Profilne slike korisnika
    # Servira direktno iz uploads/ foldera
    # --------------------------------------------------------
    location /uploads/ {
        alias /var/www/filmoteka/uploads/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --------------------------------------------------------
    # PHP FAJLOVI — Proksira se na PHP-FPM kontejner
    # "backend" je ime servisa u docker-compose.yml
    # Docker DNS automatski razrješava "backend" u IP adresu kontejnera
    # --------------------------------------------------------
    location ~ \.php$ {
        # try_files: provjeri da li PHP fajl postoji
        # Ako ne postoji, vrati 404 (sprječava security probleme)
        try_files $uri =404;

        # fastcgi_pass: proslijedi request PHP-FPM-u
        # "backend:9000" = ime servisa + PHP-FPM port
        fastcgi_pass backend:9000;

        # Uključi standardne FastCGI parametre
        include fastcgi_params;

        # SCRIPT_FILENAME: govori PHP-FPM-u koji fajl da izvrši
        # $document_root = /var/www/filmoteka (naš root)
        # $fastcgi_script_name = /index.php, /login.php, itd.
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        # Proslijedi PATH_INFO (korisno za URL rewriting)
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeout za PHP izvršavanje (u sekundama)
        fastcgi_read_timeout 300;

        # Veličina buffera za PHP response
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # --------------------------------------------------------
    # ROOT LOCATION — Glavna logika routiranja
    # --------------------------------------------------------
    location / {
        # try_files logika:
        # 1. $uri — traži tačan fajl (npr. /stil.css → stil.css)
        # 2. $uri/ — traži direktorij
        # 3. /landing.php — fallback na landing stranicu
        # Ovo je ekvivalent tvom .htaccess RewriteRule-u
        try_files $uri $uri/ /landing.php;
    }

    # --------------------------------------------------------
    # CUSTOM 404 ERROR PAGE
    # --------------------------------------------------------
    error_page 404 /404.php;
    location = /404.php {
        fastcgi_pass backend:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        internal;
    }

    # --------------------------------------------------------
    # SIGURNOST — Blokiraj pristup osjetljivim fajlovima
    # --------------------------------------------------------

    # Blokiraj pristup .env fajlovima (lozinke!)
    location ~ /\.env {
        deny all;
        return 404;
    }

    # Blokiraj pristup .htaccess fajlovima
    location ~ /\.ht {
        deny all;
        return 404;
    }

    # Blokiraj direktni pristup db.php-u iz browsera
    location = /db.php {
        deny all;
        return 404;
    }

    # --------------------------------------------------------
    # LOGGING — Za debugging
    # --------------------------------------------------------
    access_log /var/log/nginx/filmoteka_access.log;
    error_log  /var/log/nginx/filmoteka_error.log warn;
}
