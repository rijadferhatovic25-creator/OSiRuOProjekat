server {
    listen 80;

    server_name _;

    root /var/www/filmoteka;

    index landing.php index.php index.html;

    charset utf-8;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        text/html;

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        try_files $uri =404;

        expires 1y;
        add_header Cache-Control "public, immutable";

        add_header Access-Control-Allow-Origin *;
    }

    location /uploads/ {
        alias /var/www/filmoteka/uploads/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~ \.php$ {

        try_files $uri =404;

        fastcgi_pass backend:9000;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_read_timeout 300;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }
    location / {
        try_files $uri $uri/ /landing.php;
    }

    error_page 404 /404.php;
    location = /404.php {
        fastcgi_pass backend:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        internal;
    }


    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.ht {
        deny all;
        return 404;
    }

    location = /db.php {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/filmoteka_access.log;
    error_log  /var/log/nginx/filmoteka_error.log warn;
}
